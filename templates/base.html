<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Autism Care Platform{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">Autism Care MVP</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/admin/dashboard">Admin</a>
        <a class="btn btn-outline-light btn-sm" href="/consultations/doctor/dashboard">Doctor</a>
        <a class="btn btn-outline-light btn-sm" href="/assessment/page">Assessment</a>
        <a class="btn btn-outline-light btn-sm" href="/appointments/booking-page">Booking</a>
        <a class="btn btn-outline-light btn-sm" href="/consultations/patient/my-consultations">Prescriptions</a>
        <a class="btn btn-light btn-sm" href="/login">Login</a>
        <button id="logoutBtn" class="btn btn-danger btn-sm" type="button">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        await fetch('/auth/logout', { method: 'POST' });
        localStorage.removeItem('token');
        localStorage.removeItem('role');
        window.location.href = '/login';
      });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
